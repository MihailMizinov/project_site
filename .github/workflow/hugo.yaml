name: Deploy to GitHub Pages

on:
  # Запускать при пуше в main ветку
  push:
    branches: ["main"]
  # Разрешить ручной запуск из интерфейса GitHub
  workflow_dispatch:

# Устанавливаем права для GitHub Actions
permissions:
  contents: read
  pages: write
  id-token: write

# Обеспечиваем только одну одновременную публикацию
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build site
        run: hugo --minify --gc

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

